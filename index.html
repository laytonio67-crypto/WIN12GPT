<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaytonOS</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- BOOT SCREEN -->

<div id="boot">

    <div class="windows-logo">
        ⊞
    </div>

    <h1>LaytonOS</h1>

    <div class="loading">
        <div></div>
    </div>

</div>





<!-- LOGIN -->

<div id="login">

    <div class="login-card">

        <div class="avatar">
            👤
        </div>

        <h1>Layton</h1>

        <button onclick="login()">
            Sign In
        </button>

    </div>

</div>







<!-- DESKTOP -->

<div id="desktop">


    <div class="icon" onclick="openApp('explorer')">

        📁
        <span>
            Explorer
        </span>

    </div>



    <div class="icon" onclick="openApp('terminal')">

        💻
        <span>
            Terminal
        </span>

    </div>



    <div class="icon" onclick="openApp('notepad')">

        📝
        <span>
            Notepad
        </span>

    </div>



    <div class="icon" onclick="openApp('settings')">

        ⚙️
        <span>
            Settings
        </span>

    </div>


</div>








<!-- WINDOWS AREA -->

<div id="windows">

</div>








<!-- START MENU -->

<div id="startMenu">


    <h2>
        LaytonOS
    </h2>


    <input placeholder="Search">



    <div class="start-grid">


        <button onclick="openApp('explorer')">
            📁
            <br>
            Explorer
        </button>


        <button onclick="openApp('terminal')">
            💻
            <br>
            Terminal
        </button>


        <button onclick="openApp('notepad')">
            📝
            <br>
            Notepad
        </button>


        <button onclick="openApp('settings')">
            ⚙️
            <br>
            Settings
        </button>


    </div>


</div>








<!-- TASKBAR -->


<div id="taskbar">


<button onclick="toggleStart()">
⊞
</button>



<button onclick="openApp('explorer')">
📁
</button>



<button onclick="openApp('terminal')">
💻
</button>



<button onclick="openApp('notepad')">
📝
</button>



<div id="clock">

</div>


</div>






<script src="system/storage.js"></script>

<script src="apps/explorer.js"></script>
<script src="apps/terminal.js"></script>
<script src="apps/notepad.js"></script>
<script src="apps/settings.js"></script>

<script src="script.js"></script>


</body>

</html>
