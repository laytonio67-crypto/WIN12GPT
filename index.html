<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaytonOS</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- BOOT -->

<section id="boot">

    <div class="logo">
        L
    </div>

    <h1>LaytonOS</h1>

    <p>Initializing system...</p>

    <div class="progress">
        <div></div>
    </div>

</section>





<!-- LOGIN -->

<section id="login">


    <div class="login-card">

        <div class="profile">
            👤
        </div>


        <h1>Layton</h1>


        <button onclick="startDesktop()">
            Sign in
        </button>


    </div>


</section>







<!-- DESKTOP -->

<main id="desktop">


    <div class="desktop-icon"
    onclick="openApp('explorer')">

        📁
        <span>
            Explorer
        </span>

    </div>



    <div class="desktop-icon"
    onclick="openApp('terminal')">

        💻
        <span>
            Terminal
        </span>

    </div>



    <div class="desktop-icon"
    onclick="openApp('settings')">

        ⚙️
        <span>
            Settings
        </span>

    </div>


</main>








<!-- APP WINDOWS -->


<div id="window-area">



</div>








<!-- START MENU -->


<div id="start-menu">


<h2>
LaytonOS
</h2>


<input placeholder="Search apps">



<div class="apps">


<button onclick="openApp('explorer')">
📁
Explorer
</button>


<button onclick="openApp('terminal')">
💻
Terminal
</button>


<button onclick="openApp('settings')">
⚙️
Settings
</button>


</div>


</div>









<!-- TASKBAR -->


<footer id="taskbar">


<button onclick="toggleStart()">

⊞

</button>



<div class="task-apps">


<button onclick="openApp('explorer')">
📁
</button>


<button onclick="openApp('terminal')">
💻
</button>


<button onclick="openApp('settings')">
⚙️
</button>


</div>




<div id="clock">

</div>



</footer>






<script src="script.js"></script>

</body>

</html>
